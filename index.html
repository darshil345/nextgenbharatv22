<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NextGen Bharat</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #020617;
}

/* BASE GRADIENT */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at top, #0f172a, #020617);
  z-index: -3;
}

/* GLOW 1 */
body::after {
  content: "";
  position: fixed;
  top: 10%;
  left: 20%;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(56,189,248,0.25), transparent 70%);
  filter: blur(120px);
  z-index: -2;
}

/* GLOW 2 */
.glow-india {
  position: fixed;
  bottom: 10%;
  right: 20%;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(34,197,94,0.25), transparent 70%);
  filter: blur(120px);
  z-index: -2;
}

/* GRID */
.grid {
  position: fixed;
  width: 100%;
  height: 100%;
  background-image: 
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 50px 50px;
  z-index: -1;
}

/* APP */
iframe {
  position: relative;
  z-index: 1;
  width: 100vw;
  height: 100vh;
  border: none;
}
</style>
</head>

<body>

<div class="grid"></div>
<div class="glow-india"></div>

<iframe src="https://nextgenbharatv2.lovable.app"></iframe>

</body>
</html>
